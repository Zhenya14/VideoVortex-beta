// Функція для відкриття вкладки
function openTab(evt, tabName) {
    // Приховуємо всі вкладки
    const tabcontent = document.getElementsByClassName("tabcontent");
    for (let i = 0; i < tabcontent.length; i++) {
        tabcontent[i].style.display = "none";
    }

    // Видаляємо клас active з усіх кнопок
    const tablinks = document.getElementsByClassName("tablinks");
    for (let i = 0; i < tablinks.length; i++) {
        tablinks[i].classList.remove("active");
    }

    // Показуємо потрібну вкладку
    document.getElementById(tabName).style.display = "block";

    // Додаємо клас active до кнопки, по якій клікнули
    evt.currentTarget.classList.add("active");
}

// Відкриваємо вкладку за замовчуванням після завантаження DOM
document.addEventListener("DOMContentLoaded", () => {
    const defaultTab = document.getElementById("defaultOpen");
    if (defaultTab) defaultTab.click();
});
</script>
<script>
// ===================== Сніг =====================
let snowInterval = null;

function createSnowflake() {
    const snowflake = document.createElement("div");
    snowflake.className = "snowflake";
    snowflake.textContent = ["❄️","❅","❆"][Math.floor(Math.random()*3)];
    snowflake.style.left = Math.random()*100 + "vw";
    snowflake.style.fontSize = (Math.random()*15+10) + "px";
    snowflake.style.opacity = Math.random()*0.8+0.2;
    snowflake.style.setProperty('--x', Math.random());

    const duration = Math.random()*3+4; // 4–7 сек
    snowflake.style.animation = `fall ${duration}s linear forwards`;

    document.body.appendChild(snowflake);
    setTimeout(()=>snowflake.remove(), duration*1000);
}

function startSnow() {
    if(snowInterval) return;
    snowInterval = setInterval(createSnowflake, 150);
}

function stopSnow() {
    clearInterval(snowInterval);
    snowInterval = null;
    document.querySelectorAll(".snowflake").forEach(f=>f.remove());
}

// ===================== Пасхалка потрійного кліку =====================
let logoClickCount = 0;
let logoClickTimer = null;

function launchNewYearEasterEgg() {
    // Додатковий сніг на пасхалку
    startSnow();
    alert("🎉 Пасхалка Нового Року! Сніг йде! 🎉");
}

// ===================== Ініціалізація =====================
document.addEventListener("DOMContentLoaded", () => {
    const logo = document.getElementById("logo");
    const today = new Date();
    const month = today.getMonth()+1;
    const day = today.getDate();

    // Новорічний період (1 січня)
    const isNewYearPeriod = (month === 12 && day >= 15) || (month === 1 && day <= 25);
    if(isNewYearPeriod && logo && !logo.dataset.originalSrc) {
        logo.dataset.originalSrc = logo.src;
        logo.src = "VideoVortex_new_year's_logo.jpg"; // новорічний логотип
    }

    // ---------- СНІГ 1 СІЧНЯ ----------
    if(month === 1 && day === 1) {
        startSnow();
    }

    // ---------- Потрійний клік для пасхалки ----------
    if(logo) {
        logo.addEventListener("click", () => {
            logoClickCount++;
            if(logoClickCount === 1) {
                logoClickTimer = setTimeout(()=>{logoClickCount=0;},1200);
            }
            if(logoClickCount===3){
                clearTimeout(logoClickTimer);
                logoClickCount=0;
                launchNewYearEasterEgg();
            }
        });
    }
});
</script>

    auth.signInWithEmailAndPassword(email, password)
        .then(() => {

            authNotification.style.color = "green";

        })
        .catch((error) => {
            if (error.code === "auth/user-disabled") {
                authNotification.innerHTML = "🚫 Ваш акаунт заблокований. Ви можете подати апеляцію.";

                const appealBtn = document.createElement("button");
                appealBtn.textContent = "Подати апеляцію";
                appealBtn.style.marginLeft = "10px";
                appealBtn.style.padding = "5px 10px";
                appealBtn.style.border = "none";

                appealBtn.style.background = "#4facfe";
                appealBtn.style.color = "#fff";
                appealBtn.style.cursor = "pointer";
                appealBtn.onclick = openAppeal;

                authNotification.appendChild(appealBtn);
            } else if (error.code === "auth/wrong-password" || error.code === "auth/invalid-email") {
                authNotification.innerHTML = "❌ Невірний логін або пароль.";
            } else if (error.code === "auth/user-not-found") {
                authNotification.innerHTML = "⚠️ Користувача з такою поштою не існує.";
            } else {
                authNotification.innerHTML = "❌ Невірний логін або пароль.";
            }
            authNotification.style.color = "red";
        });
});

    // Реєстрація
    document.getElementById("register-form").addEventListener("submit", async (e) => {
        e.preventDefault();

        const name = document.getElementById("register-name").value.trim();
        const supername = document.getElementById("register-supername").value.trim();
        const email = document.getElementById("register-email").value.trim();
        const password = document.getElementById("register-password").value.trim();
        const confirmation = document.getElementById("register-confirmation-password").value.trim();
        const birthInput = document.getElementById("birthdate").value;

        if (!name || !supername || !email || !password || !confirmation || !birthInput) {
            registerNotification.innerHTML = "Будь ласка, заповніть всі поля!";
            registerNotification.style.color = "red";
            return; // зупинити виконання
        }

        if (password !== confirmation) {
            registerNotification.innerHTML = "Паролі не збігаються!";
            registerNotification.style.color = "red";
            return; // зупинити виконання
        }

        const [year, month, day] = birthInput.split("-");
        const birthdate = `${day}.${month}.${year}`;
        const birthYear = parseInt(year);

        try {
            const userCredential = await auth.createUserWithEmailAndPassword(email, password);
            const uid = userCredential.user.uid;

            await database.ref("users/" + uid).set({
                name: name,
                supername: supername,
                email: email,
                birthdate: birthdate,
                birthYear: birthYear,
                createdAt: new Date().toISOString()
            });

            registerNotification.innerHTML = "✅ Реєстрація успішна!";
            registerNotification.style.color = "green";
            setTimeout(() => window.location.href = "index.html", 1000);
        } catch (error) {
            if (error.code === "auth/email-already-in-use") {
                registerNotification.innerHTML = "❗ Така електронна пошта вже використовується!";
            } else if (error.code === "auth/weak-password") {
                registerNotification.innerHTML = "⚠️ Пароль має бути щонайменше 6 символів!";
            } else {
                registerNotification.innerHTML = "Помилка: " + error.message;
            }
            registerNotification.style.color = "red";
        }
    });
</script>
