<script>
function openTab(evt, tabName) {
  const tabcontent = document.getElementsByClassName("tabcontent");
  for (let i=0;i<tabcontent.length;i++) tabcontent[i].style.display="none";
  const tablinks = document.getElementsByClassName("tablinks");
  for (let i=0;i<tablinks.length;i++) tablinks[i].classList.remove("active");
  document.getElementById(tabName).style.display="block";
  evt.currentTarget.classList.add("active");
}

document.addEventListener("DOMContentLoaded",()=>{
  document.getElementById("defaultOpen").click();
});
</script>

    }

    return isBlocked;

  } catch {
    return false;
  }
}

function getInitials(name) {
  if (!name) return "?";

  const parts = name.trim().split(" ");

  if (parts.length === 1) return parts[0][0].toUpperCase();

  return (parts[0][0] + parts[1][0]).toUpperCase();
}

let isHiddenAccount = false;
let nameAccount = "";

async function loadProfile() {
  try {
    const snapModeration = await database.ref(`moderation/users/${blockedUserUid}`).once("value");
    const dataModeration = snapModeration.val() || {};

    const snap = await database.ref(`users/${blockedUserUid}`).once("value");
    const data = snap.val();

    // ❌ NOT EXISTS
    if (!snap.exists()) {
      avatar.style.backgroundImage = "";
      avatar.textContent = "?";
      userName.textContent = "Невідомий користувач";
      isHiddenAccount = true;
      return;
    }

    // ❌ BLOCK CHECK
    if (blockedUserUid) {
      const blockedMeProfile = await didUserBlockMe(blockedUserUid);

      if (blockedMeProfile) {
        avatar.style.backgroundImage = "";
        avatar.textContent = "❌";
        userName.textContent = "Акаунт не знайдено";
        userName.setAttribute("data-i18n", "account-not-found");
        applyTranslations();
        isHiddenAccount = true;
        return;
      }
    }

    const isFrozen = dataModeration.status === "frozen_soft";

    // ======================
    // NAME
    // ======================
    const name = `${data.name || "Користувач"} ${data.supername || ""}`.trim();

    userName.textContent = isFrozen ? "❄️ Видалений акаунт" : name;
    nameAccount = name;

    if (isFrozen) {
      userName.setAttribute("data-i18n", "account-frozen");
      applyTranslations();
    }

    // ======================
    // AVATAR
    // ======================
    if (isFrozen) {
      avatar.style.backgroundImage = "";
      avatar.style.background = data.color || "#ccc";
      avatar.textContent = "👻";
    } else if (data.avatarId) {
      try {
        const url = await firebase
          .storage()
          .ref(`avatars/${data.avatarId}.webp`)
          .getDownloadURL();

        avatar.style.backgroundImage = `url(${url})`;
        avatar.style.backgroundSize = "cover";
        avatar.style.backgroundPosition = "center";
        avatar.textContent = "";
      } catch (e) {
        avatar.style.backgroundImage = "";
        avatar.style.background = data.color || "#ccc";
        avatar.textContent = getInitials(name);
      }
    } else {
      avatar.style.backgroundImage = "";
      avatar.style.background = data.color || "#ccc";
      avatar.textContent = getInitials(name);
    }

    // ======================
    // WALLPAPER
    // ======================
    if (!data.wallpaperId) {
      backgroundProfile.style.backgroundImage = "";
    } else {
      try {
        const urlWallpaper = await firebase
          .storage()
          .ref(`wallpapers/${data.wallpaperId}.webp`)
          .getDownloadURL();

        backgroundProfile.style.backgroundImage = `url(${urlWallpaper})`;
        backgroundProfile.style.backgroundSize = "cover";
        backgroundProfile.style.backgroundPosition = "center";
      } catch (e) {
        backgroundProfile.style.backgroundImage = "";
      }
    }

  } catch (e) {
    console.error("loadProfile error:", e);

    if (!isHiddenAccount) {
      avatar.style.backgroundImage = "";
      avatar.textContent = "⚠️";
      userName.textContent = "Помилка завантаження " + e.message;
    }
  }
}
async function loadVideos() {
  const videoGallery = document.getElementById("video-gallery");
  videoGallery.innerHTML = "";

  const snapshot = await firebase.database().ref("videos").once("value");

  if (!snapshot.exists()) {
    videoGallery.innerHTML = "<h3>🎬 Публікації відсутні</h3>";
    return;
  }

  const videos = [];
  snapshot.forEach(child => {
    const v = child.val();
    if (v) videos.push({ key: child.key, ...v });
  });

  const filtered = [];

  for (const v of videos) {
    if (!v.authorUid) continue;

    if (blockedUserUid && v.authorUid !== blockedUserUid) continue;

    const blockedMe = await didUserBlockMe(v.authorUid);
    if (blockedMe) continue;
    filtered.push(v);
  }

  if (filtered.length === 0) {
    videoGallery.innerHTML = "<h3>🎬 Публікації відсутні</h3>";
    return;
  }

  for (const v of filtered) {
    const container = document.createElement("div");
    container.className = "video";

    const img = document.createElement("img");
    img.src = v.thumbnail || "default.jpg";

    if (v.nsfw) img.style.filter = "blur(30px)";

    img.onclick = () => {
      location.href = `video.html?key=${v.key}`;
    };

    container.appendChild(img);
    videoGallery.appendChild(container);
  }
}
document.getElementById("blockUserBtn").addEventListener("click", () => {
    showModalBlocked();
});


function showModalBlocked() {
    const modal = document.getElementById("block-user-modal");
    const info = document.getElementById("blocked-information");

    const i18nKey = userName.getAttribute("data-i18n");

    const isI18nKey =
        i18nKey === "account-not-found" ||
        i18nKey === "account-deleted" ||
        i18nKey === "account-frozen";

    if (isI18nKey) {
        info.innerHTML =
            `Ви впевнені, що хочете заблокувати користувача "<span data-i18n="${i18nKey}"></span>"?`;
    } else {
        info.textContent =
            `Ви впевнені, що хочете заблокувати користувача "${userName.textContent}"?`;
    }

    modal.style.display = "flex";
    applyTranslations();
}
function closeBlockModal() {
    document.getElementById("block-user-modal").style.display = "none";
}

async function confirmBlockUser() {
    const currentUser = firebase.auth().currentUser;
    if (!currentUser) return;

    if (!blockedUserUid) {
        alert("Не вдалося визначити користувача");
        return;
    }

    if (currentUser.uid === blockedUserUid) {
        alert("Не можна заблокувати самого себе");
        return;
    }

    await firebase.database()
      .ref(`users/${currentUser.uid}/blockedUsers/${blockedUserUid}`)
      .set({
          blocked: true,
          uid: blockedUserUid,
          userName: nameAccount
      });

    closeBlockModal();
    alert("Користувача заблоковано");
}

  const posts = [];
  snapshot.forEach(child => {

  for (const p of posts) {

    if (blockedUserUid && p.authorUid !== blockedUserUid) continue;

    const blockedMe = await didUserBlockMe(p.authorUid);

    filtered.push(p);
  }

  }
}
